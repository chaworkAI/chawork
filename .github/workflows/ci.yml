name: CI

on:
  push:
    branches: [main, master, develop, "feat/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_NET_RETRY: "10"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck & build frontend
        run: pnpm build

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache backend Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          cache-on-failure: true

      - name: Install Linux Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libssl-dev

      - name: cargo check (backend)
        run: cargo check --bins --locked
        working-directory: backend

      - name: cargo test (backend)
        run: cargo test --locked
        working-directory: backend

  windows-compat:
    runs-on: windows-2022
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache backend Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          cache-on-failure: true

      - name: Compile backend tests
        run: cargo check --locked --bins --tests
        working-directory: backend
